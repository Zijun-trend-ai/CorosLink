name: Build desktop installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build macOS installers
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run dist:mac

      - name: Verify macOS update artifacts
        run: node scripts/verify-release-artifacts.mjs macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coroslink-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build AppImage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run dist:linux

      - name: Verify Linux update artifacts
        run: node scripts/verify-release-artifacts.mjs linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coroslink-linux
          path: |
            release/*.AppImage
            release/latest-linux.yml

  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build NSIS installer
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run dist:win

      - name: Verify Windows update artifacts
        run: node scripts/verify-release-artifacts.mjs windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coroslink-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
