name: Release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs --from-tag "${{ github.ref_name }}" --sync

      - name: Verify release version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs --from-tag "${{ github.ref_name }}" --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build DMG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run dist:mac

      - name: Verify macOS update artifacts
        run: node scripts/verify-release-artifacts.mjs macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: coroslink-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs --from-tag "${{ github.ref_name }}" --sync

      - name: Verify release version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs --from-tag "${{ github.ref_name }}" --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build AppImage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run dist:linux

      - name: Verify Linux update artifacts
        run: node scripts/verify-release-artifacts.mjs linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: coroslink-linux
          path: |
            release/*.AppImage
            release/latest-linux.yml

  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs --from-tag "${{ github.ref_name }}" --sync

      - name: Verify release version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-release-version.mjs --from-tag "${{ github.ref_name }}" --check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build NSIS installer
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run dist:win

      - name: Verify Windows update artifacts
        run: node scripts/verify-release-artifacts.mjs windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: coroslink-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  release:
    name: Publish GitHub Release
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: coroslink-macos
          path: release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: coroslink-linux
          path: release/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: coroslink-windows
          path: release/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/macos/*
            release/linux/*
            release/windows/*
